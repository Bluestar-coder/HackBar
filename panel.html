<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HackBar</title>
    <link rel="stylesheet" href="panel.css">
  </head>
  <body>
    <main class="app">
      <nav class="menu-bar" aria-label="HackBar tools">
        <details class="menu">
          <summary>Encryption</summary>
          <div class="menu-popover">
            <button type="button" data-tool="base64-encode">Base64 Encode</button>
            <button type="button" data-tool="base64-decode">Base64 Decode</button>
            <button type="button" data-tool="md5">MD5</button>
            <button type="button" data-tool="sha1">SHA-1</button>
            <button type="button" data-tool="sha256">SHA-256</button>
          </div>
        </details>
        <details class="menu">
          <summary>Encoding</summary>
          <div class="menu-popover">
            <button type="button" data-tool="url-encode">URL Encode</button>
            <button type="button" data-tool="url-decode">URL Decode</button>
            <button type="button" data-tool="html-encode">HTML Encode</button>
            <button type="button" data-tool="html-decode">HTML Decode</button>
            <button type="button" data-tool="hex-encode">Hex Encode</button>
            <button type="button" data-tool="hex-decode">Hex Decode</button>
            <button type="button" data-tool="unicode-encode">Unicode Encode</button>
            <button type="button" data-tool="unicode-decode">Unicode Decode</button>
          </div>
        </details>
        <details class="menu">
          <summary>SQL</summary>
          <div class="menu-popover">
            <button type="button" data-insert="'">Quote</button>
            <button type="button" data-insert="' OR '1'='1">Boolean test</button>
            <button type="button" data-insert="' UNION SELECT NULL-- ">Union select</button>
            <button type="button" data-insert="' ORDER BY 1-- ">Order by</button>
            <button type="button" data-insert="-- ">Comment dash</button>
            <button type="button" data-insert="/* */">Comment block</button>
            <button type="button" data-insert="' AND SLEEP(5)-- ">Time delay</button>
          </div>
        </details>
        <details class="menu">
          <summary>XSS</summary>
          <div class="menu-popover">
            <button type="button" data-insert="<script>alert(1)</script>">Alert</button>
            <button type="button" data-insert="&quot;><img src=x onerror=alert(1)>">Image error</button>
            <button type="button" data-insert="<svg onload=alert(1)>">SVG onload</button>
            <button type="button" data-insert="&quot; autofocus onfocus=alert(1) x=&quot;">Attribute break</button>
            <button type="button" data-insert="javascript:alert(1)">JavaScript URL</button>
          </div>
        </details>
        <details class="menu">
          <summary>Other</summary>
          <div class="menu-popover">
            <button type="button" data-insert="../">Path segment</button>
            <button type="button" data-insert="{{7*7}}">Template test</button>
            <button type="button" data-insert="../../../../etc/passwd">LFI passwd</button>
            <button type="button" data-insert="C:\Windows\win.ini">LFI win.ini</button>
            <button type="button" data-insert="${7*7}">SSTI dollar</button>
            <button type="button" data-insert="<%= 7*7 %>">SSTI ERB</button>
            <button type="button" data-insert="<!DOCTYPE xxe [<!ENTITY xxe SYSTEM &quot;file:///etc/passwd&quot;>]><root>&amp;xxe;</root>">XXE basic</button>
          </div>
        </details>
        <span id="status" class="status" role="status">Ready</span>
      </nav>

      <section class="classic-panel" aria-label="Request editor">
        <div class="action-column">
          <button id="loadUrl" type="button">Load URL</button>
          <button id="splitUrl" type="button">Split URL</button>
          <button id="send" type="button">Execute</button>
        </div>

        <div class="request-column">
          <textarea id="url" class="url-box" spellcheck="false" autocomplete="off" aria-label="URL"></textarea>

          <div class="option-row" aria-label="Request options">
            <label><input id="postData" type="checkbox"> Post data</label>
            <label><input id="refererToggle" type="checkbox"> Referer</label>
            <label><input id="userAgentToggle" type="checkbox"> User Agent</label>
            <label><input id="cookiesToggle" type="checkbox"> Cookies</label>
            <label><input id="updatePage" type="checkbox"> Update page</label>
            <button id="clearAll" class="link-button" type="button">Clear All</button>
          </div>

          <div class="extra-fields" aria-label="Optional request headers">
            <label class="extra-field" data-extra-field="referer">
              <span>Referer</span>
              <textarea id="refererValue" spellcheck="false" autocomplete="off"></textarea>
            </label>
            <label class="extra-field" data-extra-field="userAgent">
              <span>User Agent</span>
              <textarea id="userAgentValue" spellcheck="false" autocomplete="off"></textarea>
            </label>
            <label class="extra-field" data-extra-field="cookies">
              <span>Cookies</span>
              <textarea id="cookiesValue" spellcheck="false" autocomplete="off" placeholder="name=value; other=value"></textarea>
            </label>
          </div>

          <textarea id="body" class="post-box" spellcheck="false" aria-label="Post data"></textarea>

          <details class="advanced">
            <summary>Headers</summary>
            <textarea id="headers" spellcheck="false" placeholder="Accept: application/json"></textarea>
          </details>
        </div>
      </section>

      <section class="response" aria-label="Response viewer">
        <div class="response-header">
          <div class="response-meta">
            <span id="responseStatus">No response</span>
            <span id="responseTime"></span>
            <span id="responseSize"></span>
            <span id="responseFormat"></span>
          </div>
          <div class="response-actions">
            <button id="toggleResponse" type="button" class="toggle-response" aria-expanded="true">Collapse</button>
            <div class="response-tabs" role="tablist" aria-label="Response views">
              <button id="responseBodyTab" type="button" data-response-tab="body" aria-selected="true">Body</button>
              <button id="responseHeadersTab" type="button" data-response-tab="headers" aria-selected="false">Headers</button>
            </div>
          </div>
        </div>
        <div class="response-panels">
          <div class="field response-panel is-active" data-response-panel="body">
            <div class="response-panel-title">
              <span>Response Body</span>
              <span class="body-view-tabs" role="tablist" aria-label="Body views">
                <button id="bodyTreeView" type="button" data-body-view="tree" aria-selected="true">Tree</button>
                <button id="bodyRawView" type="button" data-body-view="raw" aria-selected="false">Raw</button>
              </span>
            </div>
            <textarea id="responseBody" readonly spellcheck="false"></textarea>
            <div id="responseBodyTree" class="response-tree" role="region" aria-label="Response body tree"></div>
            <pre id="responseBodyView" class="response-code" aria-label="Highlighted response body"></pre>
          </div>
          <div class="field response-panel" data-response-panel="headers">
            <span>Response Headers</span>
            <textarea id="responseHeaders" readonly spellcheck="false"></textarea>
            <pre id="responseHeadersView" class="response-code" aria-label="Highlighted response headers"></pre>
          </div>
        </div>
      </section>
    </main>

    <script src="page-update.js"></script>
    <script src="request-tools.js"></script>
    <script src="response-format.js"></script>
    <script src="response-tree.js"></script>
    <script src="panel.js"></script>
  </body>
</html>
